<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schrodinger Lab</title>
  </head>
  <body>
    <main id="app">
      <section class="surface" aria-label="1D Schrodinger equation lab">
        <div class="viewport">
          <canvas id="scene" aria-label="3D wave function scene"></canvas>
          <div id="axis-x" class="axis-label" data-latex="x"></div>
          <div id="axis-re" class="axis-label" data-latex="\operatorname{Re}\Psi"></div>
          <div id="axis-im" class="axis-label" data-latex="\operatorname{Im}\Psi"></div>
        </div>

        <aside class="panel">
          <div class="title-block">
            <div class="title-eyebrow">
              <span>Schrodinger Lab</span>
              <span>1D</span>
            </div>
            <div class="title-equation">
              <h1 data-latex="\Psi(x,t)"></h1>
              <div class="title-state">
                <span data-latex="-L\le x<L"></span>
                <span class="formula" data-latex="i\partial_t\Psi=\left[-\frac{1}{2m}\partial_x^2+V(x)\right]\Psi"></span>
              </div>
            </div>
          </div>

          <div class="lab-tabs" aria-label="pages">
            <a href="./">well</a>
            <a class="active" href="./schrodinger.html">potential</a>
          </div>

          <section class="lab-section expression">
            <h2>initial state</h2>
            <label class="field">
              <span>initial <span data-latex="\Psi(x,0)"></span></span>
              <textarea id="initial-expression" spellcheck="false">e^{-0.7x^2}e^{4ix}</textarea>
            </label>
            <div id="initial-preview" class="latex-preview"></div>
            <div class="row">
              <div class="field compact preset-field">
                <span>initial examples</span>
                <div class="preset-picker">
                  <button id="initial-preset-button" class="preset-button" type="button" aria-expanded="false" aria-controls="initial-preset-menu"></button>
                  <div id="initial-preset-menu" class="preset-menu" hidden></div>
                </div>
              </div>
            </div>
          </section>

          <section class="lab-section expression">
            <h2>potential</h2>
            <label class="field">
              <span>potential <span data-latex="V(x)"></span></span>
              <textarea id="potential-expression" spellcheck="false">0</textarea>
            </label>
            <div id="potential-preview" class="latex-preview"></div>
            <div class="row">
              <div class="field compact preset-field">
                <span>potential examples</span>
                <div class="preset-picker">
                  <button id="potential-preset-button" class="preset-button" type="button" aria-expanded="false" aria-controls="potential-preset-menu"></button>
                  <div id="potential-preset-menu" class="preset-menu" hidden></div>
                </div>
              </div>
              <button id="apply" class="apply" type="button">apply</button>
            </div>
            <p id="status" class="status"></p>
          </section>

          <section class="lab-section controls-section">
            <h2>evolution</h2>
            <div class="segmented" role="group" aria-label="Display mode">
              <button id="mode-wave" class="active" type="button" data-latex="\Psi"></button>
              <button id="mode-density" type="button" data-latex="|\Psi|^2"></button>
            </div>

            <label class="control">
              <span>time <span data-latex="t"></span></span>
              <output id="time-output">0.00</output>
              <input id="time" type="range" min="0" max="9" step="0.01" value="0" />
            </label>

            <label class="control">
              <span>mass <span data-latex="m"></span></span>
              <output id="mass-output">1.00</output>
              <input id="mass" type="range" min="0.35" max="3" step="0.01" value="1" />
            </label>

            <label class="control">
              <span>domain <span data-latex="L"></span></span>
              <output id="domain-output">8.0</output>
              <input id="domain" type="range" min="4" max="14" step="0.25" value="8" />
            </label>

            <div class="toggles">
              <label><input id="animate" type="checkbox" /> evolve</label>
              <label><input id="phase" type="checkbox" checked /> phase ribbon</label>
              <label><input id="initial-wave" type="checkbox" checked /> <span id="initial-wave-label" data-latex="\Psi(x,0)"></span></label>
              <label><input id="potential-visible" type="checkbox" checked /> <span data-latex="V(x)"></span></label>
            </div>
          </section>
        </aside>
      </section>
    </main>
    <script type="module" src="/src/schrodinger.ts"></script>
  </body>
</html>
