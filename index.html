<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Square Well Wave Function</title>
  </head>
  <body>
    <main id="app">
      <section class="surface" aria-label="Infinite square well wave function demo">
        <div class="viewport">
          <canvas id="scene" aria-label="3D wave function scene"></canvas>
          <div id="axis-x" class="axis-label" data-latex="x"></div>
          <div id="axis-re" class="axis-label" data-latex="\operatorname{Re}\Psi"></div>
          <div id="axis-im" class="axis-label" data-latex="\operatorname{Im}\Psi"></div>
        </div>

        <aside class="panel">
          <div class="title-block">
            <div class="title-eyebrow">
              <span>Infinite square well</span>
              <span>1D</span>
            </div>
            <div class="title-equation">
              <h1 id="title-formula" data-latex="\Psi(x,t)"></h1>
              <div class="title-state">
                <span data-latex="0\le x\le 1"></span>
                <span id="domain-formula" class="formula"></span>
              </div>
            </div>
          </div>

          <div class="expression">
            <label class="field">
              <span>initial <span data-latex="f(x)"></span></span>
              <textarea id="expression" spellcheck="false">x(1-x)</textarea>
            </label>
            <div id="expression-preview" class="latex-preview"></div>

            <div class="row">
              <div class="field compact preset-field">
                <span>examples</span>
                <div class="preset-picker">
                  <button id="preset-button" class="preset-button" type="button" aria-expanded="false" aria-controls="preset-menu"></button>
                  <div id="preset-menu" class="preset-menu" hidden></div>
                </div>
              </div>
              <button id="apply-expression" class="apply" type="button">apply</button>
            </div>

            <p id="expression-status" class="status"></p>
          </div>

          <div class="segmented" role="group" aria-label="Display mode">
            <button id="mode-wave" class="active" type="button" data-latex="\Psi"></button>
            <button id="mode-density" type="button" data-latex="|\Psi|^2"></button>
          </div>

          <label class="control">
            <span>time <span data-latex="\tau"></span></span>
            <output id="time-output">0.00</output>
            <input id="time" type="range" min="0" max="6.283" step="0.001" value="0" />
          </label>

          <label class="control">
            <span>basis terms</span>
            <output id="terms-output">32</output>
            <input id="terms" type="range" min="4" max="80" step="1" value="32" />
          </label>

          <section class="spectrum" aria-label="Coefficient spectrum">
            <div class="spectrum-head">
              <span data-latex="C_n"></span>
              <span>vs.</span>
              <span data-latex="n"></span>
            </div>
            <svg id="coeff-chart" viewBox="0 0 360 128" role="img" aria-label="C_n coefficient bar chart"></svg>
          </section>

          <div class="toggles">
            <label><input id="animate" type="checkbox" checked /> evolve</label>
            <label><input id="phase" type="checkbox" checked /> phase ribbon</label>
            <label><input id="initial-wave" type="checkbox" /> <span data-latex="\Psi(x,0)"></span></label>
          </div>
        </aside>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
